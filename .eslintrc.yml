---
env:
  es2022: true
  node: true
  jest: true
extends:
  - eslint:recommended
  - plugin:@typescript-eslint/recommended
  - plugin:jest/recommended
parser: '@typescript-eslint/parser'
plugins:
  - '@typescript-eslint'
  - jest
ignorePatterns:
  - 'dist/'
  - 'node_modules/'
  - 'coverage/'
rules:
  '@typescript-eslint/no-unused-vars':
    - error
    - argsIgnorePattern: '^_'
  '@typescript-eslint/no-explicit-any': warn
  no-console: warn
