name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # ── TypeScript build & lint ─────────────────────────────────────────────────
  test-typescript:
    name: TypeScript Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Check Format
        id: npm-format-check
        run: npm run format:check

      - name: Lint
        id: npm-lint
        run: npm run lint

      - name: Build (package)
        id: npm-package
        run: npm run package

  # ── Integration test matrix ─────────────────────────────────────────────────
  test-action:
    name: Integration Test (${{ matrix.os }} / ${{ matrix.method }})
    runs-on: ${{ matrix.os }}
    needs: test-typescript

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        method: [auto, npm, release]

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (for npm method)
        if: matrix.method == 'npm' || matrix.method == 'auto'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test Local Action
        id: setup-unirtm
        uses: ./
        with:
          install_method: ${{ matrix.method }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'true'

      - name: Print Outputs
        id: print-outputs
        shell: bash
        run: |
          echo "cache-hit     = ${{ steps.setup-unirtm.outputs.cache-hit }}"
          echo "unirtm-version = ${{ steps.setup-unirtm.outputs.unirtm-version }}"
          echo "install-method = ${{ steps.setup-unirtm.outputs.install-method }}"

      - name: Verify unirtm in PATH
        shell: bash
        run: unirtm version

  # ── go install method test ──────────────────────────────────────────────────
  test-action-go:
    name: Integration Test (${{ matrix.os }} / go)
    runs-on: ${{ matrix.os }}
    needs: test-typescript

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Test Local Action (go method)
        id: setup-unirtm
        uses: ./
        with:
          install_method: go
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify unirtm in PATH
        shell: bash
        run: unirtm version

  # ── Release Orchestration ───────────────────────────────────────────────────
  release-please:
    name: '🚀 Release Orchestration'
    needs: [test-action, test-action-go]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: '📝 Orchestrate Release Lifecycle (Release Please)'
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          release-type: node
          target-branch: ${{ github.ref_name }}

      - name: '🏗️ Checkout Release PR Branch'
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ fromJson(steps.release.outputs.pr).headBranchName }}
          persist-credentials: false

      - name: '📦 Setup Node Environment (Syncing)'
        if: ${{ steps.release.outputs.pr && hashFiles('package.json') != '' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: ''

      - name: '🔗 Synchronize Manifests & Lockfiles'
        if: ${{ steps.release.outputs.pr && hashFiles('package.json') != '' }}
        shell: sh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f "pnpm-lock.yaml" ]; then
            pnpm install --no-frozen-lockfile
          elif [ -f "yarn.lock" ]; then
            yarn install --no-immutable
          elif [ -f "package-lock.json" ]; then
            npm install --package-lock-only
          fi
          git add .
          git commit --signoff -m "chore(release): synchronize lockfiles for version bump" || echo "No changes to sync"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}
